<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Coruja Presente</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111;
overflow:hidden;
}

#topbar{
position:absolute;
top:0;
left:0;
right:0;
height:70px;
background:#161616;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
z-index:20;
border-bottom:1px solid #2a2a2a;
}

#logo{
color:white;
font-size:34px;
font-weight:bold;
}

#city-search{
width:320px;
padding:12px;
border:none;
border-radius:12px;
background:#222;
color:white;
font-size:15px;
outline:none;
}

#sidebar{
position:absolute;
top:70px;
left:0;
bottom:0;
width:280px;
background:#181818;
padding:20px;
z-index:20;
overflow:auto;
border-right:1px solid #2a2a2a;
}

#map{
position:absolute;
top:70px;
left:280px;
right:340px;
bottom:0;
}

#rightpanel{
position:absolute;
top:70px;
right:0;
bottom:0;
width:340px;
background:#181818;
padding:20px;
z-index:20;
overflow:auto;
border-left:1px solid #2a2a2a;
}

.menu-title{
color:#999;
font-size:13px;
margin-bottom:15px;
text-transform:uppercase;
letter-spacing:1px;
}

.menu-item{
background:#222;
padding:15px;
border-radius:14px;
margin-bottom:12px;
color:white;
cursor:pointer;
transition:0.2s;
display:flex;
align-items:center;
justify-content:space-between;
}

.menu-item:hover{
background:#333;
}

.menu-left{
display:flex;
align-items:center;
gap:10px;
}

.checkbox{
width:18px;
height:18px;
border-radius:4px;
background:#00c853;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
}

.counter{
background:#333;
padding:5px 10px;
border-radius:20px;
font-size:13px;
}

.stats-box{
background:#222;
padding:18px;
border-radius:16px;
margin-bottom:18px;
}

.stats-title{
font-size:13px;
color:#999;
margin-bottom:10px;
text-transform:uppercase;
}

.stats-number{
font-size:42px;
font-weight:bold;
color:white;
}

.stats-text{
font-size:26px;
font-weight:bold;
color:white;
}

.mapboxgl-popup-content{
background:#1b1b1b;
color:white;
border-radius:16px;
padding:18px;
}

.popup-title{
font-size:22px;
font-weight:bold;
margin-bottom:12px;
color:#ff4d4d;
}

.popup-text{
font-size:14px;
line-height:1.7;
}

.popup-link{
display:inline-block;
margin-top:12px;
padding:10px 14px;
border-radius:10px;
background:#2a2a2a;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<div id="topbar">

<div id="logo">
🦉 Coruja Presente
</div>

<input
type="text"
id="city-search"
placeholder="🔍 Onde você mora?"
>

</div>

<div id="sidebar">

<div class="menu-title">
Categorias
</div>

<div class="menu-item" onclick="toggleCategoria('Acidente')">

<div class="menu-left">
<div class="checkbox" id="check-Acidente">✓</div>
🚗 Acidentes
</div>

<div class="counter" id="count-Acidente">0</div>

</div>

<div class="menu-item" onclick="toggleCategoria('Crime')">

<div class="menu-left">
<div class="checkbox" id="check-Crime">✓</div>
🔫 Crimes
</div>

<div class="counter" id="count-Crime">0</div>

</div>

<div class="menu-item" onclick="toggleCategoria('Afogamento')">

<div class="menu-left">
<div class="checkbox" id="check-Afogamento">✓</div>
🌊 Afogamentos
</div>

<div class="counter" id="count-Afogamento">0</div>

</div>

<div class="menu-item" onclick="toggleCategoria('Incêndio')">

<div class="menu-left">
<div class="checkbox" id="check-Incêndio">✓</div>
🔥 Incêndios
</div>

<div class="counter" id="count-Incêndio">0</div>

</div>

</div>

<div id="map"></div>

<div id="rightpanel">

<div class="menu-title">
Estatísticas da cidade
</div>

<div class="stats-box">
<div class="stats-title">
Cidade selecionada
</div>

<div class="stats-text" id="cidadeAtual">
Macaé
</div>
</div>

<div class="stats-box">
<div class="stats-title">
Ocorrências filtradas
</div>

<div class="stats-number" id="totalOcorrencias">
0
</div>
</div>

<div class="stats-box">
<div class="stats-title">
Categoria dominante
</div>

<div class="stats-text" id="categoriaDominante">
-
</div>
</div>

<div class="stats-box">
<div class="stats-title">
Bairro mais afetado
</div>

<div class="stats-text" id="bairroDominante">
-
</div>
</div>

<div class="stats-box">
<div class="stats-title">
Mortes registradas
</div>

<div class="stats-number" id="totalMortes">
0
</div>
</div>

<div class="stats-box">
<div class="stats-title">
Feridos registrados
</div>

<div class="stats-number" id="totalFeridos">
0
</div>
</div>

</div>

<script>

mapboxgl.accessToken = 'pk.eyJ1IjoidnBzOTA5MCIsImEiOiJjbW9zcTcxaGowMXlnMnNwcnVzbmU0Y2VnIn0.nhpXVRVOFPbGjy_zBmnV-w';

const map = new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/dark-v11',
center:[-41.8034,-22.4060],
zoom:11,
maxBounds:[
[-42.3,-22.8],
[-41.2,-21.8]
]
});

const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgXkVwHtnAUHymxilLI8PLSIe8vqTC-sZHNNy5RpgGlCCUYku0DDYXyFxXI8OWKQWZNxnhA820PGyA/pub?output=csv';

let markers = [];
let dados = [];

let filtrosAtivos = {
Acidente:true,
Crime:true,
Afogamento:true,
Incêndio:true
};

Papa.parse(csvUrl,{

download:true,
header:true,

complete:function(results){

dados = results.data;

criarMarcadores();
atualizarPainel();

}

});

function criarMarcadores(){

dados.forEach(function(item){

if(item.Latitude && item.Longitude){

let cor = 'red';

if(item.Categoria == 'Crime'){
cor = 'black';
}

if(item.Categoria == 'Afogamento'){
cor = 'blue';
}

if(item.Categoria == 'Incêndio'){
cor = 'orange';
}

const popupHTML = `

<div class="popup-title">
${item.TipoOcorrencia}
</div>

<div class="popup-text">

📍 ${item.Bairro}<br>
🕒 ${item.Hora}<br>
⚠️ ${item.Gravidade}<br><br>

${item.Descricao}<br><br>

Feridos: ${item.VitimasFeridas}<br>
Mortos: ${item.VitimasMortas}<br>

<a class="popup-link" href="${item.Link}" target="_blank">
Ver fonte
</a>

</div>

`;

const marker = new mapboxgl.Marker({
color:cor
})

.setLngLat([
parseFloat(item.Longitude),
parseFloat(item.Latitude)
])

.setPopup(
new mapboxgl.Popup({offset:25})
.setHTML(popupHTML)
)

.addTo(map);

marker.categoria = item.Categoria;
marker.item = item;

markers.push(marker);

}

});

}

function atualizarPainel(){

let total = 0;
let mortes = 0;
let feridos = 0;

let categorias = {};
let bairros = {};

markers.forEach(marker=>{

if(filtrosAtivos[marker.categoria]){

marker.getElement().style.display = 'block';

total++;

const item = marker.item;

categorias[item.Categoria] =
(categorias[item.Categoria] || 0) + 1;

bairros[item.Bairro] =
(bairros[item.Bairro] || 0) + 1;

mortes += parseInt(item.VitimasMortas || 0);
feridos += parseInt(item.VitimasFeridas || 0);

}else{

marker.getElement().style.display = 'none';

}

});

document.getElementById('totalOcorrencias').innerText = total;
document.getElementById('totalMortes').innerText = mortes;
document.getElementById('totalFeridos').innerText = feridos;

let maiorCategoria = '-';
let maiorCategoriaValor = 0;

for(let categoria in categorias){

if(categorias[categoria] > maiorCategoriaValor){

maiorCategoriaValor = categorias[categoria];
maiorCategoria = categoria;

}

}

document.getElementById('categoriaDominante').innerText = maiorCategoria;

let maiorBairro = '-';
let maiorBairroValor = 0;

for(let bairro in bairros){

if(bairros[bairro] > maiorBairroValor){

maiorBairroValor = bairros[bairro];
maiorBairro = bairro;

}

}

document.getElementById('bairroDominante').innerText = maiorBairro;

document.getElementById('count-Acidente').innerText =
categorias['Acidente'] || 0;

document.getElementById('count-Crime').innerText =
categorias['Crime'] || 0;

document.getElementById('count-Afogamento').innerText =
categorias['Afogamento'] || 0;

document.getElementById('count-Incêndio').innerText =
categorias['Incêndio'] || 0;

}

function toggleCategoria(categoria){

filtrosAtivos[categoria] = !filtrosAtivos[categoria];

const checkbox =
document.getElementById('check-' + categoria);

if(filtrosAtivos[categoria]){

checkbox.style.background = '#00c853';
checkbox.innerText = '✓';

}else{

checkbox.style.background = '#555';
checkbox.innerText = '';

}

atualizarPainel();

}

document.getElementById('city-search')
.addEventListener('keypress',function(e){

if(e.key === 'Enter'){

const cidade =
this.value.toLowerCase();

if(cidade.includes('macae') ||
cidade.includes('macaé')){

map.flyTo({
center:[-41.8034,-22.4060],
zoom:11
});

document.getElementById('cidadeAtual')
.innerText = 'Macaé';

}

}

});

</script>

</body>
</html>
