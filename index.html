<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapa Interativo</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body {
margin: 0;
padding: 0;
font-family: Arial;
}

#map {
position: absolute;
top: 0;
bottom: 0;
width: 100%;
}

.popup {
font-size: 14px;
}

.popup h3 {
margin: 0 0 10px;
color: red;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

mapboxgl.accessToken = 'pk.eyJ1IjoidnBzOTA5MCIsImEiOiJjbW9zcTcxaGowMXlnMnNwcnVzbmU0Y2VnIn0.nhpXVRVOFPbGjy_zBmnV-w';

const map = new mapboxgl.Map({
container: 'map',
style: 'mapbox://styles/mapbox/dark-v11',
center: [-41.878, -22.376],
zoom: 11
});

const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgXkVwHtnAUHymxilLI8PLSIe8vqTC-sZHNNy5RpgGlCCUYku0DDYXyFxXI8OWKQWZNxnhA820PGyA/pub?output=csv';

Papa.parse(csvUrl, {
download: true,
header: true,
complete: function(results) {

results.data.forEach(function(item) {

if(item.Latitude && item.Longitude) {

const popupHTML = `
<div class="popup">
<h3>${item.Categoria}</h3>

<b>Tipo:</b> ${item.Tipo}<br>
<b>Cidade:</b> ${item.Cidade}<br>
<b>Bairro:</b> ${item.Bairro}<br>
<b>Ocorrência:</b> ${item.TipoOcorrencia}<br>
<b>Gravidade:</b> ${item.Gravidade}<br>
<b>Feridos:</b> ${item.VitimasFeridas}<br>
<b>Mortos:</b> ${item.VitimasMortas}<br><br>

${item.Descricao}
</div>
`;

new mapboxgl.Marker({ color: 'red' })
.setLngLat([
parseFloat(item.Longitude),
parseFloat(item.Latitude)
])
.setPopup(
new mapboxgl.Popup({ offset: 25 })
.setHTML(popupHTML)
)
.addTo(map);

}

});

}
});

</script>

</body>
</html>
